# Stack de observabilidade SOMENTE (Prometheus + Grafana), rodando local observando a API no Render.
#   Prometheus -> http://localhost:9090
#   Grafana    -> http://localhost:3002

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.render.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_monitor_data:/prometheus

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3002:3000"
    volumes:
      - grafana_monitor_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  prometheus_monitor_data:
  grafana_monitor_data:
